/* --------------------------- 운동 픽토그램 --------------------------- */

/* --------------------- 자체 SVG 라인 차트 --------------------- */
function MiniLineChart({ data, series, height = 220 }) {
  const W = 700, H = height, padL = 38, padR = 14, padT = 12, padB = 26;
  const n = data.length;
  const vals = [];
  series.forEach((s) => data.forEach((d) => { const v = +d[s.key]; if (!isNaN(v)) vals.push(v); }));
  let min = vals.length ? Math.min(...vals) : 0;
  let max = vals.length ? Math.max(...vals) : 1;
  if (min === max) { min -= 1; max += 1; }
  const span = max - min; min -= span * 0.12; max += span * 0.12;
  const X = (i) => padL + (n <= 1 ? (W - padL - padR) / 2 : (i / (n - 1)) * (W - padL - padR));
  const Y = (v) => padT + (1 - (v - min) / (max - min)) * (H - padT - padB);
  const grid = [0, 0.5, 1].map((t) => min + t * (max - min));
  return (
    <div>
      <div className="flex flex-wrap gap-3" style={{ marginBottom: 8 }}>
        {series.map((s) => (
          <span key={s.key} className="flex items-center gap-1" style={{ fontSize: 11.5, color: T.muted }}>
            <span style={{ width: 11, height: 11, borderRadius: 3, background: s.color, display: "inline-block" }} /> {s.name}
          </span>
        ))}
      </div>
      <svg viewBox={"0 0 " + W + " " + H} width="100%" style={{ height: "auto", display: "block" }}>
        {grid.map((g, i) => (
          <g key={i}>
            <line x1={padL} y1={Y(g)} x2={W - padR} y2={Y(g)} stroke={T.line} strokeDasharray="3 3" />
            <text x={padL - 6} y={Y(g) + 3} textAnchor="end" fontSize="10" fill={T.muted}>{g.toFixed(1)}</text>
          </g>
        ))}
        {data.map((d, i) => (
          <text key={"x" + i} x={X(i)} y={H - 8} textAnchor="middle" fontSize="10" fill={T.muted}>{String(d.date).slice(5)}</text>
        ))}
        {series.map((s) => {
          const pts = data.map((d, i) => { const v = +d[s.key]; return isNaN(v) ? null : (X(i) + "," + Y(v)); }).filter(Boolean).join(" ");
          return <polyline key={s.key} points={pts} fill="none" stroke={s.color} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" />;
        })}
        {series.map((s) => data.map((d, i) => { const v = +d[s.key]; return isNaN(v) ? null : <circle key={s.key + i} cx={X(i)} cy={Y(v)} r="3" fill={s.color} />; }))}
      </svg>
    </div>
  );
}

/* 프로그램 정규화 — key/intensity/번호 보정 (구버전 데이터 호환) */
function normalizeProgram(arr) {
  if (!Array.isArray(arr) || !arr.length) arr = initialProgram;
  return arr.map((d, i) => ({
    ...d,
    day: i + 1,
    key: d.key || ("d" + (i + 1)),
    intensity: d.intensity || "mid",
    category: d.category || "fullbody",
    exercises: d.exercises || [],
  }));
}

/* ------------------------ localStorage 저장/복원 ------------------------ */
const STORE_KEY = "pt_dashboard_lee_v2";
function loadStore() {
  try { const raw = localStorage.getItem(STORE_KEY); if (raw) return JSON.parse(raw); } catch (e) {}
  return null;
}
const SAVED = loadStore();

/* ------------------------------ CSV 유틸 ------------------------------ */
function downloadCSV(filename, rows) {
  const csv = Papa.unparse(rows);
  const blob = new Blob(["\uFEFF" + csv], { type:"text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/* ============================== 메인 ============================== */
function PTDashboard() {
  const [tab, setTab] = useState("dashboard");
  const [profile, setProfile] = useState(SAVED?.profile || initialProfile);
  const [bodyComp, setBodyComp] = useState(SAVED?.bodyComp || initialBodyComp);
  const [program, setProgram] = useState(normalizeProgram(SAVED?.program || initialProgram));
  const [history, setHistory] = useState(SAVED?.history || []);
  const [currentDayIdx, setCurrentDayIdx] = useState(SAVED?.currentDayIdx ?? 0);
  const [selectedDayIdx, setSelectedDayIdx] = useState(SAVED?.currentDayIdx ?? 0);
  const [dayConditions, setDayConditions] = useState(SAVED?.dayConditions || {});
  const [logInputs, setLogInputs] = useState({});

  const today = new Date().toISOString().slice(0, 10);
  const todayCondition = dayConditions[today] || "normal";
  const setTodayCondition = (m) => setDayConditions((prev) => ({ ...prev, [today]: m }));

  useEffect(() => {
    try { localStorage.setItem(STORE_KEY, JSON.stringify({ profile, bodyComp, program, history, currentDayIdx, dayConditions })); } catch (e) {}
  }, [profile, bodyComp, program, history, currentDayIdx, dayConditions]);

  const tabs = [
    { id:"dashboard", label:"대시보드", icon:I.dashboard },
    { id:"health", label:"건강상태", icon:I.health },
    { id:"body", label:"체성분", icon:I.activity },
    { id:"log", label:"운동기록", icon:I.list },
    { id:"program", label:"프로그램", icon:I.dumbbell },
    { id:"backup", label:"백업", icon:I.database },
  ];

  const latest = bodyComp[bodyComp.length - 1] || {};
  const first = bodyComp[0] || {};
  const currentDay = program[currentDayIdx] || program[0];
  const selectedDay = program[selectedDayIdx] || currentDay;

  /* 세션 완료 — 선택한 Day 기록 후 다음으로 진행 */
  function completeSession() {
    const day = selectedDay;
    const entries = day.exercises.map((ex) => {
      const v = logInputs[ex.id] || {};
      return { exerciseName: ex.name, weight: v.weight ?? "", unit: ex.unit, reps: v.reps ?? ex.reps, sets: v.sets ?? ex.sets };
    });
    const session = { date: today, dayNumber: day.day, dayName: day.name, condition: todayCondition, entries };
    setHistory((h) => [session, ...h]);
    const next = (selectedDayIdx + 1) % program.length;
    setCurrentDayIdx(next);
    setSelectedDayIdx(next);
    setLogInputs({});
  }

  function toggleUnit(dayIdx, exId) {
    setProgram((prev) => prev.map((d, di) => di !== dayIdx ? d : {
      ...d, exercises: d.exercises.map((e) => e.id !== exId ? e : { ...e, unit: e.unit === "kg" ? "lb" : "kg" }),
    }));
  }
  function substitute(dayIdx, exId, altName) {
    setProgram((prev) => prev.map((d, di) => di !== dayIdx ? d : {
      ...d, exercises: d.exercises.map((e) => {
        if (e.id !== exId) return e;
        const newAlts = e.alternatives.filter((a) => a !== altName);
        newAlts.push(e.name);
        return { ...e, name: altName, alternatives: newAlts };
      }),
    }));
  }
  function cycleIntensity(key) {
    setProgram((prev) => prev.map((d) => d.key === key ? { ...d, intensity: NEXT_INT[d.intensity] || "mid" } : d));
  }

  /* 재정렬 — 번호 갱신 + currentDay/selectedDay를 같은 Day로 유지 */
  function applyReorder(newArr) {
    const curKey = program[currentDayIdx] && program[currentDayIdx].key;
    const selKey = program[selectedDayIdx] && program[selectedDayIdx].key;
    const renum = newArr.map((d, i) => ({ ...d, day: i + 1 }));
    setProgram(renum);
    const ci = renum.findIndex((d) => d.key === curKey);
    const si = renum.findIndex((d) => d.key === selKey);
    setCurrentDayIdx(ci >= 0 ? ci : 0);
    setSelectedDayIdx(si >= 0 ? si : 0);
  }
  function moveDay(from, to) {
    if (to < 0 || to >= program.length) return;
    const a = [...program];
    const m = a.splice(from, 1)[0];
    a.splice(to, 0, m);
    applyReorder(a);
  }
  function sortLight() {
    applyReorder([...program].sort((x, y) => (INT_ORDER[x.intensity] || 2) - (INT_ORDER[y.intensity] || 2)));
  }
  function sortDefault() {
    const num = (d) => parseInt(String(d.key).replace(/\D/g, ""), 10) || 0;
    applyReorder([...program].sort((x, y) => num(x) - num(y)));
  }

  /* CSV 내보내기 */
  const exportProgram = () => {
    const rows = [];
    program.forEach((d) => d.exercises.forEach((e) =>
      rows.push({ day:d.day, dayName:d.name, exercise:e.name, category:e.category, unit:e.unit, sets:e.sets, reps:e.reps, intensity:d.intensity, alternatives:e.alternatives.join(" | ") })));
    downloadCSV("PT_프로그램.csv", rows);
  };
  const exportHistory = () => {
    const rows = [];
    history.forEach((s) => s.entries.forEach((en) =>
      rows.push({ date:s.date, day:s.dayNumber, dayName:s.dayName, exercise:en.exerciseName, weight:en.weight, unit:en.unit, reps:en.reps, sets:en.sets })));
    downloadCSV("PT_운동기록.csv", rows.length ? rows : [{ date:"", day:"", dayName:"", exercise:"", weight:"", unit:"", reps:"", sets:"" }]);
  };
  const exportBody = () => downloadCSV("PT_체성분.csv", bodyComp);
  const exportProfile = () => downloadCSV("PT_건강프로필.csv", [{
    name:profile.name, gender:profile.gender, age:profile.age, height:profile.height,
    goals:profile.goals.join(" | "), findings:profile.findings.join(" | "), notes:profile.notes }]);
  const exportAll = () => { exportProgram(); exportHistory(); exportBody(); exportProfile(); };

  /* CSV 불러오기 */
  function parseFile(file, onDone) {
    Papa.parse(file, { header:true, skipEmptyLines:true, complete:(res) => onDone(res.data) });
  }
  const importBody = (file) => parseFile(file, (rows) =>
    setBodyComp(rows.map((r) => ({ date:r.date, weight:+r.weight, skeletalMuscle:+r.skeletalMuscle, bodyFat:+r.bodyFat, bodyFatPct:+r.bodyFatPct, bmi:+r.bmi })).filter((r) => r.date)));
  const importProfile = (file) => parseFile(file, (rows) => {
    const r = rows[0]; if (!r) return;
    setProfile({ name:r.name||"", gender:r.gender||"", age:+r.age||"", height:+r.height||"",
      goals:(r.goals||"").split(" | ").filter(Boolean), findings:(r.findings||"").split(" | ").filter(Boolean), notes:r.notes||"" });
  });
  const importProgram = (file) => parseFile(file, (rows) => {
    const byDay = {};
    rows.forEach((r) => { const d = +r.day;
      if (!byDay[d]) byDay[d] = { day:d, key:"d"+d, name:r.dayName||("Day "+d), category:r.category||"fullbody", intensity:r.intensity||"mid", exercises:[] };
      byDay[d].exercises.push({ id:"d"+d+"e"+(byDay[d].exercises.length+1), name:r.exercise, category:r.category||"fullbody",
        unit:r.unit||"kg", sets:r.sets, reps:r.reps, alternatives:(r.alternatives||"").split(" | ").filter(Boolean) }); });
    const arr = normalizeProgram(Object.values(byDay).sort((a,b) => a.day-b.day));
    if (arr.length) { setProgram(arr); setCurrentDayIdx(0); setSelectedDayIdx(0); }
  });
  const importHistory = (file) => parseFile(file, (rows) => {
    const byKey = {};
    rows.forEach((r) => { const key = r.date+"_"+r.day;
      if (!byKey[key]) byKey[key] = { date:r.date, dayNumber:+r.day, dayName:r.dayName, entries:[] };
      byKey[key].entries.push({ exerciseName:r.exercise, weight:r.weight, unit:r.unit, reps:r.reps, sets:r.sets }); });
    setHistory(Object.values(byKey).filter((s) => s.date).reverse());
  });

  /* 렌더 */
  return (
    <div style={{ fontFamily:T.sans, background:T.bg, color:T.ink, minHeight:"100vh" }}>
      <div className="mx-auto" style={{ maxWidth:1080, padding:"20px 18px 60px" }}>
        <header className="flex items-center justify-between" style={{ marginBottom:18 }}>
          <div>
            <div style={{ fontSize:11, letterSpacing:3, color:T.muted, textTransform:"uppercase" }}>Personal Training</div>
            <h1 style={{ fontFamily:T.serif, fontSize:30, fontWeight:700, lineHeight:1.1, margin:"2px 0 0" }}>
              {profile.name} <span style={{ color:T.muted, fontSize:18, fontWeight:400 }}>전용 대시보드</span>
            </h1>
          </div>
          <div className="text-right" style={{ fontSize:12, color:T.muted }}>
            <div>{profile.gender} · {profile.age}세 · {profile.height}cm</div>
            <div style={{ color:T.primary, fontWeight:600, marginTop:2 }}>다음 운동: Day {currentDay.day} · {currentDay.name}</div>
            {todayCondition !== "normal" && (
              <div style={{ color:T.accent, fontWeight:700, marginTop:2 }}>{"오늘 컨디션: " + (todayCondition === "light" ? "가벼움" : "회복")}</div>
            )}
          </div>
        </header>

        <nav className="flex flex-wrap gap-2" style={{ marginBottom:22 }}>
          {tabs.map((tb) => {
            const active = tab === tb.id; const Icon = tb.icon;
            return (
              <button key={tb.id} onClick={() => setTab(tb.id)} className="flex items-center gap-2"
                style={{ padding:"9px 14px", borderRadius:10, fontSize:13, fontWeight:600, cursor:"pointer",
                  border:"1px solid "+(active?T.primary:T.line), background:active?T.primary:T.surface, color:active?"#fff":T.ink }}>
                <Icon size={15} /> {tb.label}
              </button>
            );
          })}
        </nav>

        {tab === "dashboard" && (
          <div className="flex flex-col gap-5">
            <div className="grid grid-cols-2 gap-3 md:grid-cols-4">
              <StatCard label="현재 체중" value={latest.weight + " kg"} delta={(latest.weight - first.weight).toFixed(1)} unit="kg" />
              <StatCard label="체지방률" value={latest.bodyFatPct + " %"} delta={(latest.bodyFatPct - first.bodyFatPct).toFixed(1)} unit="%p" />
              <StatCard label="골격근량" value={latest.skeletalMuscle + " kg"} delta={(latest.skeletalMuscle - first.skeletalMuscle).toFixed(1)} unit="kg" good />
              <StatCard label="BMI" value={"" + latest.bmi} delta={(latest.bmi - first.bmi).toFixed(1)} unit="" />
            </div>
            <div className="grid grid-cols-1 gap-4 md:grid-cols-3">
              <Panel title="추세" className="md:col-span-2">
                <MiniLineChart data={bodyComp} height={220} series={[
                  { key:"weight", color:T.ink, name:"체중(kg)" },
                  { key:"bodyFatPct", color:T.accent, name:"체지방률(%)" },
                  { key:"skeletalMuscle", color:T.primary, name:"골격근(kg)" },
                ]} />
              </Panel>
              <Panel title="오늘의 목표 세션">
                <div className="flex items-center gap-3" style={{ marginBottom:10 }}>
                  <ExerciseIcon category={currentDay.category} />
                  <div>
                    <div style={{ fontFamily:T.serif, fontSize:18, fontWeight:600 }}>Day {currentDay.day}</div>
                    <div style={{ fontSize:12, color:T.muted }}>{currentDay.name}</div>
                  </div>
                </div>
                <ul style={{ fontSize:12.5, color:T.muted, lineHeight:1.9, margin:0, paddingLeft:14 }}>
                  {currentDay.exercises.map((e) => <li key={e.id}>{e.name} · {e.sets}×{e.reps}</li>)}
                </ul>
                <button onClick={() => { setSelectedDayIdx(currentDayIdx); setTab("log"); }} className="flex items-center justify-center gap-1"
                  style={{ marginTop:12, width:"100%", padding:"9px", borderRadius:9, border:"none", background:T.primary, color:"#fff", fontWeight:600, fontSize:13, cursor:"pointer" }}>
                  기록 시작 <I.chevronRight size={15} />
                </button>
              </Panel>
            </div>
            <Panel title="목표">
              <div className="flex flex-wrap gap-2">
                {profile.goals.map((g, i) => <span key={i} style={{ fontSize:12.5, padding:"6px 12px", borderRadius:999, background:T.primarySoft, color:T.primary, fontWeight:600 }}>{g}</span>)}
              </div>
            </Panel>
          </div>
        )}

        {tab === "health" && (
          <div className="flex flex-col gap-4">
            <Panel title="임상 소견 / 자세 평가">
              <ul style={{ margin:0, paddingLeft:16, lineHeight:2, fontSize:13.5 }}>{profile.findings.map((f, i) => <li key={i}>{f}</li>)}</ul>
            </Panel>
            <Panel title="목표">
              <ul style={{ margin:0, paddingLeft:16, lineHeight:2, fontSize:13.5 }}>{profile.goals.map((g, i) => <li key={i}>{g}</li>)}</ul>
            </Panel>
            <Panel title="트레이너 메모">
              <textarea className="pt-input" rows={4} value={profile.notes} onChange={(e) => setProfile({ ...profile, notes:e.target.value })} />
            </Panel>
          </div>
        )}

        {tab === "body" && (
          <div className="flex flex-col gap-4">
            <Panel title="측정 추이">
              <MiniLineChart data={bodyComp} height={240} series={[
                { key:"weight", color:T.ink, name:"체중(kg)" },
                { key:"bodyFat", color:T.accent, name:"체지방량(kg)" },
                { key:"skeletalMuscle", color:T.primary, name:"골격근(kg)" },
              ]} />
            </Panel>
            <Panel title="측정 기록"><BodyCompTable data={bodyComp} onChange={setBodyComp} /></Panel>
          </div>
        )}

        {tab === "log" && (
          <div className="flex flex-col gap-4">
            <Panel title="오늘 세션 설정">
              <ConditionControl label="오늘 컨디션" mode={todayCondition} setMode={setTodayCondition} />
              <p style={{ fontSize:12.5, color:T.muted, margin:"12px 0 8px" }}>
                순서상 다음은 <b>Day {currentDay.day}</b>이지만, 컨디션에 따라 다른 Day를 골라 진행해도 됩니다.
              </p>
              <div className="flex flex-wrap gap-2">
                {program.map((d, i) => {
                  const sel = i === selectedDayIdx;
                  return (
                    <button key={d.key} onClick={() => setSelectedDayIdx(i)}
                      style={{ padding:"8px 12px", borderRadius:9, fontSize:12.5, fontWeight:600, cursor:"pointer", textAlign:"left",
                        border:"1px solid "+(sel?T.primary:T.line), background:sel?T.primary:T.surface, color:sel?"#fff":T.ink }}>
                      Day {d.day} · {d.name}{i === currentDayIdx ? " · 다음" : ""}
                    </button>
                  );
                })}
              </div>
            </Panel>
            <ConditionBanner mode={todayCondition} />

            <Panel title={"기록 — Day " + selectedDay.day + " · " + selectedDay.name}>
              <p style={{ fontSize:12.5, color:T.muted, marginTop:-4, marginBottom:12 }}>
                운동명은 자동으로 채워집니다. 무게·횟수·세트만 입력 후 <b>세션 완료</b>를 누르면 기록되고 다음 Day로 진행돼요.
              </p>
              <div className="flex flex-col gap-2">
                {selectedDay.exercises.map((ex) => {
                  const v = logInputs[ex.id] || {};
                  const set = (k, val) => setLogInputs((p) => ({ ...p, [ex.id]: { ...p[ex.id], [k]:val } }));
                  return (
                    <div key={ex.id} className="flex items-center gap-3" style={{ padding:"10px 12px", border:"1px solid "+T.line, borderRadius:10, background:T.surface }}>
                      <ExerciseIcon category={ex.category} size={30} />
                      <div style={{ flex:1, minWidth:0 }}>
                        <div style={{ fontWeight:600, fontSize:13.5 }}>{ex.name}</div>
                        <div style={{ fontSize:11.5, color:T.muted }}>목표 {ex.sets}세트 × {ex.reps}</div>
                      </div>
                      <input className="pt-input" style={{ width:78 }} placeholder={"무게(" + ex.unit + ")"} value={v.weight||""} onChange={(e) => set("weight", e.target.value)} />
                      <input className="pt-input" style={{ width:64 }} placeholder="횟수" value={v.reps||""} onChange={(e) => set("reps", e.target.value)} />
                      <input className="pt-input" style={{ width:56 }} placeholder="세트" value={v.sets||""} onChange={(e) => set("sets", e.target.value)} />
                    </div>
                  );
                })}
              </div>
              <button onClick={completeSession} className="flex items-center justify-center gap-2"
                style={{ marginTop:14, width:"100%", padding:12, borderRadius:10, border:"none", background:T.primary, color:"#fff", fontWeight:700, fontSize:14, cursor:"pointer" }}>
                <I.check size={17} /> 세션 완료 · 다음 Day로 진행
              </button>
            </Panel>

            <Panel title={"기록 히스토리 (" + history.length + ")"}>
              {history.length === 0 ? <p style={{ fontSize:13, color:T.muted }}>아직 완료된 세션이 없습니다.</p> : (
                <div className="flex flex-col gap-2">
                  {history.map((s, i) => (
                    <div key={i} style={{ padding:"10px 12px", border:"1px solid "+T.line, borderRadius:10 }}>
                      <div className="flex items-center justify-between" style={{ marginBottom:6 }}>
                        <span className="flex items-center gap-2">
                          <span style={{ fontWeight:600, fontSize:13 }}>Day {s.dayNumber} · {s.dayName}</span>
                          {s.condition && s.condition !== "normal" && (
                            <span style={{ fontSize:10.5, fontWeight:700, color:T.accent, background:T.accentSoft, padding:"2px 8px", borderRadius:999 }}>
                              {s.condition === "light" ? "가벼움" : "회복"}
                            </span>
                          )}
                        </span>
                        <span style={{ fontSize:12, color:T.muted }}>{s.date}</span>
                      </div>
                      <div style={{ fontSize:12, color:T.muted, lineHeight:1.8 }}>
                        {s.entries.map((en, j) => <span key={j}>{en.exerciseName} {en.weight ? (en.weight + (en.unit||"")) : ""} {en.reps}×{en.sets}{j < s.entries.length-1 ? " · " : ""}</span>)}
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </Panel>
          </div>
        )}

        {tab === "program" && (
          <div className="flex flex-col gap-4">
            <Panel title="순서 · 강도 조절">
              <div className="flex flex-wrap gap-2 items-center">
                <button onClick={sortLight} className="flex items-center gap-1"
                  style={{ padding:"8px 12px", borderRadius:9, border:"1px solid "+T.primary, background:T.primarySoft, color:T.primary, fontWeight:600, fontSize:12.5, cursor:"pointer" }}>
                  <I.sort size={14} /> 가벼운 순서로 정렬
                </button>
                <button onClick={sortDefault}
                  style={{ padding:"8px 12px", borderRadius:9, border:"1px solid "+T.line, background:T.surface, color:T.ink, fontWeight:600, fontSize:12.5, cursor:"pointer" }}>
                  기본 순서로
                </button>
                <span style={{ fontSize:11.5, color:T.muted }}>강도 뱃지를 눌러 상/중/하를 바꾸거나 ▲▼로 순서를 옮기세요. 컨디션은 운동기록 탭에서 그날그날 설정합니다.</span>
              </div>
            </Panel>

            {program.map((d, di) => (
              <Panel key={d.key} className="flex-wrap"
                title={"Day " + d.day + " · " + d.name}
                badge={di === currentDayIdx ? "다음 세션" : null}
                actions={
                  <div className="flex items-center gap-1">
                    <button onClick={() => cycleIntensity(d.key)} title="탭하여 강도 변경"
                      style={{ fontSize:11, fontWeight:700, color:INT[d.intensity].c, background:INT[d.intensity].bg, border:"none", borderRadius:999, padding:"5px 11px", cursor:"pointer" }}>
                      {INT[d.intensity].l}
                    </button>
                    <button onClick={() => moveDay(di, di-1)} disabled={di===0}
                      style={{ width:28, height:28, borderRadius:8, border:"1px solid "+T.line, background:T.surface, cursor:di===0?"default":"pointer", color:di===0?T.line:T.muted, display:"flex", alignItems:"center", justifyContent:"center" }}>
                      <I.up size={14} />
                    </button>
                    <button onClick={() => moveDay(di, di+1)} disabled={di===program.length-1}
                      style={{ width:28, height:28, borderRadius:8, border:"1px solid "+T.line, background:T.surface, cursor:di===program.length-1?"default":"pointer", color:di===program.length-1?T.line:T.muted, display:"flex", alignItems:"center", justifyContent:"center" }}>
                      <I.down size={14} />
                    </button>
                  </div>
                }>
                <div className="flex flex-col gap-2">
                  {d.exercises.map((ex) => (
                    <div key={ex.id} className="flex items-center gap-3 flex-wrap" style={{ padding:"10px 12px", border:"1px solid "+T.line, borderRadius:10 }}>
                      <ExerciseIcon category={ex.category} size={30} />
                      <div style={{ flex:1, minWidth:140 }}>
                        <div style={{ fontWeight:600, fontSize:13.5 }}>{ex.name}</div>
                        <div style={{ fontSize:11.5, color:T.muted }}>{ex.sets}세트 × {ex.reps}</div>
                      </div>
                      <button onClick={() => toggleUnit(di, ex.id)} style={{ padding:"5px 10px", borderRadius:8, border:"1px solid "+T.line, background:T.surface, fontSize:12, fontWeight:600, cursor:"pointer", color:T.ink }}>
                        {ex.unit.toUpperCase()}
                      </button>
                      <div className="flex items-center gap-1" style={{ color:T.muted }}>
                        <I.repeat size={14} />
                        <select className="pt-input" style={{ width:150 }} value="" onChange={(e) => { if (e.target.value) substitute(di, ex.id, e.target.value); }}>
                          <option value="">대체 운동…</option>
                          {ex.alternatives.map((a) => <option key={a} value={a}>{a}</option>)}
                        </select>
                      </div>
                    </div>
                  ))}
                </div>
              </Panel>
            ))}
          </div>
        )}

        {tab === "backup" && (
          <div className="flex flex-col gap-4">
            <Panel title="전체 백업">
              <p style={{ fontSize:12.5, color:T.muted, marginTop:-4, marginBottom:12 }}>
                4종 데이터를 각각 CSV로 내보내고 불러올 수 있습니다. 이 페이지는 브라우저에 자동 저장되며, 기기/브라우저를 옮길 때는 CSV로 백업하세요.
              </p>
              <button onClick={exportAll} className="flex items-center justify-center gap-2"
                style={{ width:"100%", padding:11, borderRadius:10, border:"none", background:T.ink, color:"#fff", fontWeight:700, fontSize:13.5, cursor:"pointer" }}>
                <I.download size={16} /> 4개 파일 한 번에 내보내기
              </button>
            </Panel>
            <div className="grid grid-cols-1 gap-3 md:grid-cols-2">
              <BackupCard title="운동 프로그램" onExport={exportProgram} onImport={importProgram} />
              <BackupCard title="운동 기록" onExport={exportHistory} onImport={importHistory} />
              <BackupCard title="체성분" onExport={exportBody} onImport={importBody} />
              <BackupCard title="건강 프로필" onExport={exportProfile} onImport={importProfile} />
            </div>
          </div>
        )}

        <footer style={{ marginTop:28, fontSize:11, color:T.muted, textAlign:"center" }}>
          이서린 PT 대시보드 · 데이터는 백업 탭에서 CSV로 내보내기/불러오기 가능
        </footer>
      </div>
    </div>
  );
}

/* ----------------------------- 하위 컴포넌트 ----------------------------- */
function ConditionControl({ mode, setMode, label }) {
  const opts = [["normal","평소"],["light","가벼움"],["recovery","회복"]];
  return (
    <div className="flex items-center gap-2 flex-wrap">
      <span style={{ fontSize:12.5, color:T.muted, fontWeight:600 }}>{label || "컨디션"}</span>
      {opts.map(([v, l]) => {
        const on = mode === v;
        return (
          <button key={v} onClick={() => setMode(v)}
            style={{ padding:"7px 13px", borderRadius:999, fontSize:12.5, fontWeight:600, cursor:"pointer",
              border:"1px solid "+(on?T.accent:T.line), background:on?T.accentSoft:T.surface, color:on?T.accent:T.ink }}>
            {l}
          </button>
        );
      })}
    </div>
  );
}

function ConditionBanner({ mode }) {
  if (mode === "normal") return null;
  const data = mode === "light"
    ? { title:"가벼운 날 (생리 등)", tips:[
        "중량을 평소의 70–80%로 낮추고 세트수는 1세트 줄이기",
        "고중량 컴파운드(데드리프트·백스쿼트)는 머신·힙 스러스트로 대체하거나 가동범위 축소",
        "강한 코어 압박 동작은 줄이고, 걷기·사이클 등 저강도 유산소와 모빌리티 우선",
        "프로그램 탭의 ‘가벼운 순서로 정렬’로 강도 낮은 Day부터 진행",
      ]}
    : { title:"회복 · 디로드", tips:[
        "중량을 평소의 50–60%로 디로드, 세트수 축소·폼 위주",
        "통증·피로 부위 운동은 대체 운동으로 회피",
        "수면·영양·스트레칭 비중을 늘려 회복에 집중",
      ]};
  return (
    <div style={{ border:"1px solid "+T.accent, background:T.accentSoft, borderRadius:12, padding:"12px 14px" }}>
      <div style={{ fontWeight:700, fontSize:13, color:T.accent, marginBottom:6 }}>{data.title}</div>
      <ul style={{ margin:0, paddingLeft:16, fontSize:12.5, color:T.ink, lineHeight:1.8 }}>
        {data.tips.map((t, i) => <li key={i}>{t}</li>)}
      </ul>
    </div>
  );
}

function Panel({ title, badge, actions, children, className }) {
  return (
    <section className={className || ""} style={{ background:T.surface, border:"1px solid "+T.line, borderRadius:14, padding:16 }}>
      <div className="flex items-center justify-between flex-wrap gap-2" style={{ marginBottom:12 }}>
        <h2 style={{ fontFamily:T.serif, fontSize:16, fontWeight:600, margin:0 }}>{title}</h2>
        {(actions || badge) && (
          <div className="flex items-center gap-2">
            {actions}
            {badge && <span style={{ fontSize:11, fontWeight:700, color:T.accent, background:T.accentSoft, padding:"3px 9px", borderRadius:999 }}>{badge}</span>}
          </div>
        )}
      </div>
      {children}
    </section>
  );
}

function StatCard({ label, value, delta, unit, good }) {
  const num = parseFloat(delta);
  const up = num > 0;
  const positive = good ? up : !up;
  const color = num === 0 ? T.muted : positive ? T.primary : T.accent;
  return (
    <div style={{ background:T.surface, border:"1px solid "+T.line, borderRadius:14, padding:14 }}>
      <div style={{ fontSize:11.5, color:T.muted, marginBottom:4 }}>{label}</div>
      <div style={{ fontFamily:T.serif, fontSize:24, fontWeight:700, lineHeight:1 }}>{value}</div>
      <div style={{ fontSize:11.5, color, marginTop:5, fontWeight:600 }}>
        {isNaN(num) || num === 0 ? "변화 없음" : ((up ? "▲ " : "▼ ") + Math.abs(num) + " " + unit + " (시작 대비)")}
      </div>
    </div>
  );
}

function BodyCompTable({ data, onChange }) {
  const [form, setForm] = useState({ date:"", weight:"", skeletalMuscle:"", bodyFat:"", bodyFatPct:"", bmi:"" });
  const cols = [["date","날짜"],["weight","체중"],["skeletalMuscle","골격근"],["bodyFat","체지방량"],["bodyFatPct","체지방률"],["bmi","BMI"]];
  const add = () => {
    if (!form.date) return;
    const row = { ...form, weight:+form.weight, skeletalMuscle:+form.skeletalMuscle, bodyFat:+form.bodyFat, bodyFatPct:+form.bodyFatPct, bmi:+form.bmi };
    onChange([...data, row].sort((a,b) => a.date.localeCompare(b.date)));
    setForm({ date:"", weight:"", skeletalMuscle:"", bodyFat:"", bodyFatPct:"", bmi:"" });
  };
  const remove = (i) => onChange(data.filter((_, idx) => idx !== i));
  return (
    <div style={{ overflowX:"auto" }}>
      <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12.5 }}>
        <thead>
          <tr style={{ color:T.muted, textAlign:"left" }}>
            {cols.map(([, l]) => <th key={l} style={{ padding:"6px 8px", borderBottom:"1px solid "+T.line }}>{l}</th>)}
            <th style={{ borderBottom:"1px solid "+T.line }} />
          </tr>
        </thead>
        <tbody>
          {data.map((r, i) => (
            <tr key={i}>
              {cols.map(([k]) => <td key={k} style={{ padding:"7px 8px", borderBottom:"1px solid "+T.line }}>{r[k]}</td>)}
              <td style={{ padding:"7px 8px", borderBottom:"1px solid "+T.line, textAlign:"right" }}>
                <button onClick={() => remove(i)} style={{ border:"none", background:"none", cursor:"pointer", color:T.accent }}><I.trash size={15} /></button>
              </td>
            </tr>
          ))}
          <tr>
            {cols.map(([k]) => (
              <td key={k} style={{ padding:"6px 6px" }}>
                <input className="pt-input" type={k === "date" ? "date" : "number"} value={form[k]} onChange={(e) => setForm({ ...form, [k]:e.target.value })} />
              </td>
            ))}
            <td style={{ textAlign:"right" }}>
              <button onClick={add} style={{ border:"none", background:T.primary, color:"#fff", borderRadius:8, padding:"7px 9px", cursor:"pointer" }}><I.plus size={15} /></button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  );
}

function BackupCard({ title, onExport, onImport }) {
  const ref = useRef(null);
  return (
    <div style={{ background:T.surface, border:"1px solid "+T.line, borderRadius:12, padding:14 }}>
      <div style={{ fontWeight:600, fontSize:13.5, marginBottom:10 }}>{title}</div>
      <div className="flex gap-2">
        <button onClick={onExport} className="flex items-center justify-center gap-1"
          style={{ flex:1, padding:"8px", borderRadius:9, border:"1px solid "+T.primary, background:T.primarySoft, color:T.primary, fontWeight:600, fontSize:12.5, cursor:"pointer" }}>
          <I.download size={14} /> 내보내기
        </button>
        <button onClick={() => ref.current && ref.current.click()} className="flex items-center justify-center gap-1"
          style={{ flex:1, padding:"8px", borderRadius:9, border:"1px solid "+T.line, background:T.surface, color:T.ink, fontWeight:600, fontSize:12.5, cursor:"pointer" }}>
          <I.upload size={14} /> 불러오기
        </button>
        <input ref={ref} type="file" accept=".csv" style={{ display:"none" }}
          onChange={(e) => { const f = e.target.files && e.target.files[0]; if (f) onImport(f); e.target.value = ""; }} />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<PTDashboard />);
</script>
</body>
</html>

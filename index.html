/* --------------------- SVG 라인 차트 --------------------- */
function MiniLineChart({ data, series, height = 220 }) {
  const W = 700, H = height, padL = 40, padR = 14, padT = 12, padB = 26;
  const n = data.length;
  const vals = [];
  series.forEach((s) => data.forEach((d) => { const v = +d[s.key]; if (!isNaN(v)) vals.push(v); }));
  let min = vals.length ? Math.min(...vals) : 0;
  let max = vals.length ? Math.max(...vals) : 1;
  if (min === max) { min -= 1; max += 1; }
  const span = max - min; min -= span * 0.12; max += span * 0.12;
  const X = (i) => padL + (n <= 1 ? (W - padL - padR) / 2 : (i / (n - 1)) * (W - padL - padR));
  const Y = (v) => padT + (1 - (v - min) / (max - min)) * (H - padT - padB);
  const grid = [0, 0.5, 1].map((t) => min + t * (max - min));
  return (
    <div>
      <div className="flex flex-wrap gap-3" style={{ marginBottom: 8 }}>
        {series.map((s) => (
          <span key={s.key} className="flex items-center gap-1" style={{ fontSize: 12, color: T.haze, fontWeight:600 }}>
            <span style={{ width: 11, height: 11, borderRadius: 3, background: s.color, display: "inline-block" }} /> {s.name}
          </span>
        ))}
      </div>
      <svg viewBox={"0 0 " + W + " " + H} width="100%" style={{ height: "auto", display: "block" }}>
        {grid.map((g, i) => (
          <g key={i}>
            <line x1={padL} y1={Y(g)} x2={W - padR} y2={Y(g)} stroke={T.line} strokeDasharray="3 3" />
            <text x={padL - 6} y={Y(g) + 3} textAnchor="end" fontSize="10" fill={T.haze}>{g.toFixed(1)}</text>
          </g>
        ))}
        {data.map((d, i) => (
          <text key={"x" + i} x={X(i)} y={H - 8} textAnchor="middle" fontSize="10" fill={T.haze}>{String(d.date).slice(2)}</text>
        ))}
        {series.map((s) => {
          const pts = data.map((d, i) => { const v = +d[s.key]; return isNaN(v) ? null : (X(i) + "," + Y(v)); }).filter(Boolean).join(" ");
          return <polyline key={s.key} points={pts} fill="none" stroke={s.color} strokeWidth="2.2" strokeLinejoin="round" strokeLinecap="round" />;
        })}
        {series.map((s) => data.map((d, i) => { const v = +d[s.key]; return isNaN(v) ? null : <circle key={s.key + i} cx={X(i)} cy={Y(v)} r="3.2" fill={s.color} />; }))}
      </svg>
    </div>
  );
}

function normalizeProgram(arr) {
  if (!Array.isArray(arr) || !arr.length) arr = initialProgram;
  return arr.map((d, i) => ({
    ...d, day: i + 1, key: d.key || ("d" + (i + 1)),
    intensity: d.intensity || "mid", category: d.category || "fullbody",

}

  try {

  } catch (e) {}

}

/* ------------------------------ CSV ------------------------------ */
function downloadCSV(filename, rows) {
  const csv = Papa.unparse(rows);
  const blob = new Blob(["\uFEFF" + csv], { type:"text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/* --------------------------- 휴식 타이머 --------------------------- */
function RestTimer() {
  const [left, setLeft] = useState(0);
  const [total, setTotal] = useState(0);
  const ref = useRef(null);
  useEffect(() => () => clearInterval(ref.current), []);
  function start(sec) {
    clearInterval(ref.current);
    setTotal(sec); setLeft(sec);
    ref.current = setInterval(() => {
      setLeft((v) => { if (v <= 1) { clearInterval(ref.current); return 0; } return v - 1; });
    }, 1000);
  }
  function stop() { clearInterval(ref.current); setLeft(0); setTotal(0); }
  const mm = String(Math.floor(left / 60));
  const ss = String(left % 60).padStart(2, "0");
  const pct = total ? (left / total) * 100 : 0;
  return (
    <div className="card" style={{ padding:14 }}>
      <div className="flex items-center justify-between gap-3 flex-wrap">
        <div className="flex items-center gap-2" style={{ color:T.haze }}>
          <I.timer size={18} />
          <span style={{ fontSize:13, fontWeight:700 }}>휴식 타이머</span>
        </div>
        <div className="flex items-center gap-2">
          {[60, 90, 120].map((s) => (
            <button key={s} className="btn btn-sm" onClick={() => start(s)}>{s}초</button>
          ))}
          {left > 0 && <button className="btn btn-sm" style={{ color:T.clay, borderColor:T.claySoft, background:T.claySoft }} onClick={stop}>중지</button>}
        </div>
      </div>
      {left > 0 && (
        <div style={{ marginTop:10 }}>
          <div className="h-disp" style={{ fontSize:40, lineHeight:1, color: left <= 5 ? T.clay : T.ink }}>{mm}:{ss}</div>
          <div style={{ height:6, background:T.line, borderRadius:99, marginTop:8, overflow:"hidden" }}>
            <div style={{ height:"100%", width:pct + "%", background: left <= 5 ? T.clay : T.moss, transition:"width 1s linear" }} />
          </div>
        </div>
      )}
    </div>
  );
}

/* ============================== 메인 ============================== */
function PTDashboard() {
  const [tab, setTab] = useState("home");
  const [profile, setProfile] = useState(SAVED?.profile || initialProfile);
  const [bodyComp, setBodyComp] = useState(SAVED?.bodyComp || initialBodyComp);
  const [program, setProgram] = useState(normalizeProgram(SAVED?.program || initialProgram));
  const [history, setHistory] = useState(SAVED?.history || []);
  const [currentDayIdx, setCurrentDayIdx] = useState(SAVED?.currentDayIdx ?? 0);
  const [selectedDayIdx, setSelectedDayIdx] = useState(SAVED?.currentDayIdx ?? 0);
  const [dayConditions, setDayConditions] = useState(SAVED?.dayConditions || {});
  const [logInputs, setLogInputs] = useState({});
  const [openDays, setOpenDays] = useState(null); // 프로그램 탭 아코디언
  const [editKey, setEditKey] = useState(null);   // 편집 중인 Day key

  const today = new Date().toISOString().slice(0, 10);
  const todayCondition = dayConditions[today] || "normal";
  const setTodayCondition = (m) => setDayConditions((prev) => ({ ...prev, [today]: m }));

  useEffect(() => {
    try { localStorage.setItem(STORE_KEY, JSON.stringify({ profile, bodyComp, program, history, currentDayIdx, dayConditions })); } catch (e) {}
  }, [profile, bodyComp, program, history, currentDayIdx, dayConditions]);

  const navItems = [
    { id:"home", label:"홈", icon:I.home },
    { id:"log", label:"기록", icon:I.list },
    { id:"program", label:"프로그램", icon:I.dumbbell },
    { id:"body", label:"체성분", icon:I.activity },
    { id:"health", label:"건강", icon:I.health },
    { id:"backup", label:"백업", icon:I.database },
  ];

  const latest = bodyComp[bodyComp.length - 1] || {};
  const first = bodyComp[0] || {};
  const currentDay = program[currentDayIdx] || program[0];
  const selectedDay = program[selectedDayIdx] || currentDay;
  if (openDays === null && currentDay) setOpenDays([currentDay.key]);

  /* 지난 기록 조회 (history는 최신순) */
  function lastRecordFor(name) {
    for (const s of history) {
      for (const en of s.entries || []) {
        if (en.exerciseName === name && (en.weight || en.reps)) return { ...en, date: s.date };
      }
    }
    return null;
  }

  /* 세션 완료 */
  function completeSession() {
    const day = selectedDay;
    const entries = day.exercises.map((ex) => {
      const v = logInputs[ex.id] || {};
      return { exerciseName: ex.name, weight: v.weight ?? "", unit: ex.unit, reps: v.reps ?? ex.reps, sets: v.sets ?? ex.sets };
    });
    const session = { date: today, dayNumber: day.day, dayName: day.name, condition: todayCondition, entries };
    setHistory((h) => [session, ...h]);
    const next = (selectedDayIdx + 1) % program.length;
    setCurrentDayIdx(next); setSelectedDayIdx(next);
    setLogInputs({});
  }

  const doneCount = selectedDay.exercises.filter((ex) => (logInputs[ex.id] || {}).done).length;

  /* 프로그램 편집 */
  function patchExercise(dayKey, exId, patch) {
    setProgram((prev) => prev.map((d) => d.key !== dayKey ? d : {
      ...d, exercises: d.exercises.map((e) => e.id !== exId ? e : { ...e, ...patch }),
    }));
  }
  function deleteExercise(dayKey, exId) {
    setProgram((prev) => prev.map((d) => d.key !== dayKey ? d : { ...d, exercises: d.exercises.filter((e) => e.id !== exId) }));
  }
  function addExercise(dayKey, ex) {
    setProgram((prev) => prev.map((d) => d.key !== dayKey ? d : {
      ...d, exercises: [...d.exercises, { id: dayKey + "e" + Date.now(), alternatives: [], unit:"kg", category:"fullbody", ...ex }],
    }));
  }
  function renameDay(dayKey, name) {
    setProgram((prev) => prev.map((d) => d.key !== dayKey ? d : { ...d, name }));
  }
  function toggleUnit(dayKey, exId) {
    setProgram((prev) => prev.map((d) => d.key !== dayKey ? d : {
      ...d, exercises: d.exercises.map((e) => e.id !== exId ? e : { ...e, unit: e.unit === "kg" ? "lb" : "kg" }),
    }));
  }
  function substitute(dayKey, exId, altName) {
    setProgram((prev) => prev.map((d) => d.key !== dayKey ? d : {
      ...d, exercises: d.exercises.map((e) => {
        if (e.id !== exId) return e;
        const newAlts = e.alternatives.filter((a) => a !== altName); newAlts.push(e.name);
        return { ...e, name: altName, alternatives: newAlts };
      }),
    }));
  }
  function cycleIntensity(key) {
    setProgram((prev) => prev.map((d) => d.key === key ? { ...d, intensity: NEXT_INT[d.intensity] || "mid" } : d));
  }
  function applyReorder(newArr) {
    const curKey = program[currentDayIdx]?.key, selKey = program[selectedDayIdx]?.key;
    const renum = newArr.map((d, i) => ({ ...d, day: i + 1 }));
    setProgram(renum);
    const ci = renum.findIndex((d) => d.key === curKey);
    const si = renum.findIndex((d) => d.key === selKey);
    setCurrentDayIdx(ci >= 0 ? ci : 0); setSelectedDayIdx(si >= 0 ? si : 0);
  }
  function moveDay(from, to) {
    if (to < 0 || to >= program.length) return;
    const a = [...program]; const m = a.splice(from, 1)[0]; a.splice(to, 0, m);
    applyReorder(a);
  }
  const sortLight = () => applyReorder([...program].sort((x, y) => (INT_ORDER[x.intensity]||2) - (INT_ORDER[y.intensity]||2)));
  const sortDefault = () => {
    const num = (d) => parseInt(String(d.key).replace(/\D/g, ""), 10) || 0;
    applyReorder([...program].sort((x, y) => num(x) - num(y)));
  };

  /* CSV */
  const exportProgram = () => {
    const rows = [];
    program.forEach((d) => d.exercises.forEach((e) =>
      rows.push({ day:d.day, dayName:d.name, exercise:e.name, category:e.category, unit:e.unit, sets:e.sets, reps:e.reps, intensity:d.intensity, alternatives:(e.alternatives||[]).join(" | ") })));
    downloadCSV("PT_프로그램.csv", rows);
  };
  const exportHistory = () => {
    const rows = [];
    history.forEach((s) => s.entries.forEach((en) =>
      rows.push({ date:s.date, day:s.dayNumber, dayName:s.dayName, condition:s.condition||"normal", exercise:en.exerciseName, weight:en.weight, unit:en.unit, reps:en.reps, sets:en.sets })));
    downloadCSV("PT_운동기록.csv", rows.length ? rows : [{ date:"", day:"", dayName:"", condition:"", exercise:"", weight:"", unit:"", reps:"", sets:"" }]);
  };
  const exportBody = () => downloadCSV("PT_체성분.csv", bodyComp);
  const exportProfile = () => downloadCSV("PT_건강프로필.csv", [{
    name:profile.name, gender:profile.gender, age:profile.age, height:profile.height,
    goals:profile.goals.join(" | "), findings:profile.findings.join(" | "), notes:profile.notes }]);
  const exportAll = () => { exportProgram(); exportHistory(); exportBody(); exportProfile(); };

  function parseFile(file, onDone) {
    Papa.parse(file, { header:true, skipEmptyLines:true, complete:(res) => onDone(res.data) });
  }
  const importBody = (f) => parseFile(f, (rows) =>
    setBodyComp(rows.map((r) => ({ date:r.date, weight:+r.weight, skeletalMuscle:+r.skeletalMuscle, bodyFat:+r.bodyFat, bodyFatPct:+r.bodyFatPct, bmi:+r.bmi })).filter((r) => r.date)));
  const importProfile = (f) => parseFile(f, (rows) => {
    const r = rows[0]; if (!r) return;
    setProfile({ name:r.name||"", gender:r.gender||"", age:+r.age||"", height:+r.height||"",
      goals:(r.goals||"").split(" | ").filter(Boolean), findings:(r.findings||"").split(" | ").filter(Boolean), notes:r.notes||"" });
  });
  const importProgram = (f) => parseFile(f, (rows) => {
    const byDay = {};
    rows.forEach((r) => { const d = +r.day;
      if (!byDay[d]) byDay[d] = { day:d, key:"d"+d, name:r.dayName||("Day "+d), category:r.category||"fullbody", intensity:r.intensity||"mid", exercises:[] };
      byDay[d].exercises.push({ id:"d"+d+"e"+(byDay[d].exercises.length+1), name:r.exercise, category:r.category||"fullbody",
        unit:r.unit||"kg", sets:r.sets, reps:r.reps, alternatives:(r.alternatives||"").split(" | ").filter(Boolean) }); });
    const arr = normalizeProgram(Object.values(byDay).sort((a,b) => a.day-b.day));
    if (arr.length) { setProgram(arr); setCurrentDayIdx(0); setSelectedDayIdx(0); setOpenDays([arr[0].key]); }
  });
  const importHistory = (f) => parseFile(f, (rows) => {
    const byKey = {};
    rows.forEach((r) => { const key = r.date+"_"+r.day;
      if (!byKey[key]) byKey[key] = { date:r.date, dayNumber:+r.day, dayName:r.dayName, condition:r.condition||"normal", entries:[] };
      byKey[key].entries.push({ exerciseName:r.exercise, weight:r.weight, unit:r.unit, reps:r.reps, sets:r.sets }); });
    setHistory(Object.values(byKey).filter((s) => s.date).reverse());
  });

  /* ------------------------------ 렌더 ------------------------------ */
  return (
    <div style={{ minHeight:"100vh" }}>
      <div className="mx-auto page-pad" style={{ maxWidth:1080, padding:"18px 16px 92px" }}>
        {/* 헤더 */}
        <header className="flex items-end justify-between gap-2" style={{ marginBottom:14 }}>
          <div>
            <div className="label-xs">Personal Training</div>
            <h1 className="h-disp" style={{ fontSize:26, margin:"2px 0 0", lineHeight:1.15 }}>
              {profile.name} <span style={{ color:T.haze, fontSize:15, fontWeight:600 }}>대시보드</span>
            </h1>
          </div>
          <div className="text-right" style={{ fontSize:12, color:T.haze, fontWeight:600 }}>
            <div>{profile.gender} · {profile.age}세 · {profile.height}cm</div>
            {todayCondition !== "normal" && (
              <div style={{ color:T.clay, fontWeight:700, marginTop:2 }}>오늘: {todayCondition === "light" ? "가벼움" : "회복"}</div>
            )}
          </div>
        </header>

        {/* 데스크톱 상단 내비 */}
        <nav className="top-nav flex-wrap gap-2" style={{ marginBottom:20 }}>
          {navItems.map((tb) => {
            const active = tab === tb.id; const Icon = tb.icon;
            return (
              <button key={tb.id} className="btn" onClick={() => setTab(tb.id)}
                style={active ? { background:T.ink, borderColor:T.ink, color:"#fff" } : {}}>
                <Icon size={16} /> {tb.label}
              </button>
            );
          })}
        </nav>

        {/* ===== 홈 ===== */}
        {tab === "home" && (
          <div className="flex flex-col gap-4">
            {/* 오늘 세션 히어로 */}
            <div className="card" style={{ background:T.ink, border:"none", color:"#fff", padding:"20px 18px" }}>
              <div className="flex items-center justify-between gap-3 flex-wrap">
                <div>
                  <div className="label-xs" style={{ color:"#9DB3AA" }}>다음 세션</div>
                  <div className="h-disp" style={{ fontSize:34, lineHeight:1.1, margin:"4px 0 2px" }}>Day {currentDay.day}</div>
                  <div style={{ fontSize:15, fontWeight:600, color:"#D7E2DC" }}>{currentDay.name} · 운동 {currentDay.exercises.length}개</div>
                </div>
                <span style={{ fontSize:12, fontWeight:700, color:INT[currentDay.intensity].c, background:"#fff", padding:"6px 12px", borderRadius:999 }}>
                  {INT[currentDay.intensity].l}
                </span>
              </div>
              <div style={{ fontSize:13, color:"#B9C8C1", margin:"12px 0 14px", lineHeight:1.7 }}>
                {currentDay.exercises.map((e) => e.name).join(" · ")}
              </div>
              <button className="btn btn-primary" style={{ width:"100%", background:T.moss, borderColor:T.moss }}
                onClick={() => { setSelectedDayIdx(currentDayIdx); setTab("log"); }}>
                오늘 운동 기록하기
              </button>
            </div>

            {/* 체성분 요약 */}
            <div className="grid grid-cols-2 gap-3 md:grid-cols-4">
              <StatCard label="체중" value={latest.weight} unit="kg" delta={(latest.weight - first.weight).toFixed(1)} />
              <StatCard label="체지방률" value={latest.bodyFatPct} unit="%" delta={(latest.bodyFatPct - first.bodyFatPct).toFixed(1)} suffix="%p" />
              <StatCard label="골격근량" value={latest.skeletalMuscle} unit="kg" delta={(latest.skeletalMuscle - first.skeletalMuscle).toFixed(1)} good />
              <StatCard label="BMI" value={latest.bmi} unit="" delta={(latest.bmi - first.bmi).toFixed(1)} />
            </div>

            <div className="card">
              <SectionTitle>추세</SectionTitle>
              <MiniLineChart data={bodyComp} height={210} series={[
                { key:"weight", color:T.ink, name:"체중(kg)" },
                { key:"bodyFatPct", color:T.clay, name:"체지방률(%)" },
                { key:"skeletalMuscle", color:T.moss, name:"골격근(kg)" },
              ]} />
            </div>

            <div className="card">
              <SectionTitle>목표</SectionTitle>
              <div className="flex flex-wrap gap-2">
                {profile.goals.map((g, i) => (
                  <span key={i} style={{ fontSize:13, padding:"8px 14px", borderRadius:999, background:T.mossSoft, color:T.moss, fontWeight:700 }}>{g}</span>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* ===== 기록 ===== */}
        {tab === "log" && (
          <div className="flex flex-col gap-4">
            {/* 오늘 설정 */}
            <div className="card">
              <SectionTitle>오늘 세션</SectionTitle>
              <div className="flex items-center gap-2 flex-wrap" style={{ marginBottom:12 }}>
                <span style={{ fontSize:13, color:T.haze, fontWeight:700 }}>컨디션</span>
                {[["normal","평소"],["light","가벼움"],["recovery","회복"]].map(([v, l]) => (
                  <button key={v} className={"chip" + (todayCondition === v ? " on" : "")}
                    style={todayCondition === v && v !== "normal" ? { background:T.clay, borderColor:T.clay } : {}}
                    onClick={() => setTodayCondition(v)}>{l}</button>
                ))}
              </div>
              <div className="flex flex-wrap gap-2">
                {program.map((d, i) => {
                  const sel = i === selectedDayIdx;
                  return (
                    <button key={d.key} className={"chip" + (sel ? " on" : "")} onClick={() => setSelectedDayIdx(i)}>
                      Day {d.day} {d.name}{i === currentDayIdx ? " ·다음" : ""}
                    </button>

              </div>
            </div>

            <RestTimer />

            {/* 진행률 */}
            <div className="card" style={{ padding:14 }}>
              <div className="flex items-center justify-between">
                <span style={{ fontSize:13.5, fontWeight:700 }}>Day {selectedDay.day} · {selectedDay.name}</span>
                <span className="h-disp" style={{ fontSize:18 }}>{doneCount}<span style={{ color:T.haze, fontSize:14 }}> / {selectedDay.exercises.length}</span></span>
              </div>
              <div style={{ height:8, background:T.line, borderRadius:99, marginTop:8, overflow:"hidden" }}>
                <div style={{ height:"100%", width:(selectedDay.exercises.length ? (doneCount/selectedDay.exercises.length)*100 : 0) + "%", background:T.moss, transition:"width .25s" }} />
              </div>
            </div>

            {/* 운동 카드들 */}
            {selectedDay.exercises.map((ex) => {
              const v = logInputs[ex.id] || {};
              const set = (k, val) => setLogInputs((p) => ({ ...p, [ex.id]: { ...p[ex.id], [k]:val } }));
              const last = lastRecordFor(ex.name);
              const done = !!v.done;
              return (
                <div key={ex.id} className="card" style={{ padding:16, borderColor: done ? T.moss : T.line, background: done ? "#F2F8F5" : T.card }}>

                      <button className="btn btn-sm btn-soft" onClick={() => setLogInputs((p) => ({ ...p, [ex.id]: { ...p[ex.id], weight:String(last.weight||""), reps:String(last.reps||""), sets:String(last.sets||"") } }))}>

                      <div style={{ fontSize:11.5, fontWeight:700, color:T.haze, marginBottom:4 }}>무게({ex.unit})</div>

                <div key={d.key} className="card" style={{ padding:0, overflow:"hidden", borderColor: di === currentDayIdx ? T.moss : T.line }}>

                      ) : (
                        <div style={{ fontWeight:700, fontSize:15 }}>{d.name}
                          {di === currentDayIdx && <span style={{ fontSize:10.5, fontWeight:700, color:T.moss, background:T.mossSoft, padding:"2px 8px", borderRadius:999, marginLeft:8, verticalAlign:"middle" }}>다음</span>}
                        </div>
                      )}
                      <div style={{ fontSize:12, color:T.haze, fontWeight:600 }}>운동 {d.exercises.length}개</div>
                    </div>
                    <button onClick={(e) => { e.stopPropagation(); cycleIntensity(d.key); }}
                      style={{ fontSize:11.5, fontWeight:700, color:INT[d.intensity].c, background:INT[d.intensity].bg, border:"none", borderRadius:999, padding:"6px 12px", cursor:"pointer", flexShrink:0 }}>
                      {INT[d.intensity].l}
                    </button>
                    <div className="flex items-center gap-1" onClick={(e) => e.stopPropagation()}>
                      <IconBtn onClick={() => moveDay(di, di-1)} disabled={di===0}><I.up size={15} /></IconBtn>
                      <IconBtn onClick={() => moveDay(di, di+1)} disabled={di===program.length-1}><I.down size={15} /></IconBtn>
                    </div>
                  </div>

                  {/* 본문 */}
                  {open && (
                    <div style={{ borderTop:"1px solid "+T.line, padding:"14px 16px" }}>
                      <div className="flex justify-between items-center" style={{ marginBottom:10 }}>
                        <span className="label-xs">운동 목록</span>
                        <button className="btn btn-sm" style={ editing ? { background:T.ink, color:"#fff", borderColor:T.ink } : {} }
                          onClick={() => setEditKey(editing ? null : d.key)}>
                          {editing ? <React.Fragment><I.check size={14} /> 완료</React.Fragment> : <React.Fragment><I.edit size={14} /> 편집</React.Fragment>}
                        </button>
                      </div>

                      <div className="flex flex-col gap-2">
                        {d.exercises.map((ex) => {
                          const last = lastRecordFor(ex.name);
                          return (
                            <div key={ex.id} style={{ padding:"12px", border:"1px solid "+T.line, borderRadius:12 }}>
                              <div className="flex items-center gap-3">
                                <ExerciseIcon category={ex.category} size={30} />
                                <div style={{ flex:1, minWidth:0 }}>
                                  {editing ? (
                                    <input className="pt-input" value={ex.name} onChange={(e) => patchExercise(d.key, ex.id, { name:e.target.value })} />
                                  ) : (
                                    <React.Fragment>
                                      <div style={{ fontWeight:700, fontSize:14.5 }}>{ex.name}</div>
                                      <div style={{ fontSize:12, color:T.haze, fontWeight:600 }}>
                                        {ex.sets}세트 × {ex.reps}{last && last.weight ? <span> · 최근 {last.weight}{last.unit||""}</span> : null}
                                      </div>
                                    </React.Fragment>
                                  )}
                                </div>
                                {!editing && (
                                  <button className="btn btn-sm" onClick={() => toggleUnit(d.key, ex.id)}>{(ex.unit||"kg").toUpperCase()}</button>
                                )}
                                {editing && (
                                  <IconBtn danger onClick={() => deleteExercise(d.key, ex.id)}><I.trash size={15} /></IconBtn>
                                )}
                              </div>

                              {editing ? (
                                <div className="grid gap-2" style={{ marginTop:10, gridTemplateColumns:"1fr 1fr 1.2fr" }}>
                                  <div>
                                    <div style={{ fontSize:11, fontWeight:700, color:T.haze, marginBottom:4 }}>세트</div>
                                    <input className="pt-input" inputMode="numeric" value={ex.sets} onChange={(e) => patchExercise(d.key, ex.id, { sets:e.target.value })} />
                                  </div>
                                  <div>
                                    <div style={{ fontSize:11, fontWeight:700, color:T.haze, marginBottom:4 }}>횟수</div>
                                    <input className="pt-input" value={ex.reps} onChange={(e) => patchExercise(d.key, ex.id, { reps:e.target.value })} />
                                  </div>
                                  <div>
                                    <div style={{ fontSize:11, fontWeight:700, color:T.haze, marginBottom:4 }}>부위</div>
                                    <select className="pt-input" value={ex.category} onChange={(e) => patchExercise(d.key, ex.id, { category:e.target.value })}>
                                      {CATS.map(([v, l]) => <option key={v} value={v}>{l}</option>)}
                                    </select>
                                  </div>
                                </div>
                              ) : (
                                (ex.alternatives||[]).length > 0 && (
                                  <div className="flex items-center gap-2" style={{ marginTop:10, color:T.haze }}>
                                    <I.repeat size={14} />
                                    <select className="pt-input" style={{ maxWidth:220, minHeight:38, padding:"7px 10px", fontSize:13.5 }} value=""
                                      onChange={(e) => { if (e.target.value) substitute(d.key, ex.id, e.target.value); }}>
                                      <option value="">대체 운동으로 교체…</option>
                                      {ex.alternatives.map((a) => <option key={a} value={a}>{a}</option>)}
                                    </select>
                                  </div>
                                )
                              )}
                            </div>
                          );
                        })}
                      </div>

                      {editing && <AddExerciseRow onAdd={(ex) => addExercise(d.key, ex)} />}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}

        {/* ===== 체성분 ===== */}
        {tab === "body" && (
          <div className="flex flex-col gap-4">
            <div className="card">
              <SectionTitle>측정 추이</SectionTitle>
              <MiniLineChart data={bodyComp} height={230} series={[
                { key:"weight", color:T.ink, name:"체중(kg)" },
                { key:"bodyFat", color:T.clay, name:"체지방량(kg)" },
                { key:"skeletalMuscle", color:T.moss, name:"골격근(kg)" },
              ]} />
            </div>
            <div className="card">
              <SectionTitle>측정 기록</SectionTitle>
              <BodyCompTable data={bodyComp} onChange={setBodyComp} />
            </div>
          </div>
        )}

        {/* ===== 건강 ===== */}
        {tab === "health" && (
          <div className="flex flex-col gap-4">
            <div className="card">
              <SectionTitle>임상 소견 / 자세 평가</SectionTitle>
              <ul style={{ margin:0, paddingLeft:18, lineHeight:2, fontSize:14 }}>{profile.findings.map((f, i) => <li key={i}>{f}</li>)}</ul>
            </div>
            <div className="card">
              <SectionTitle>목표</SectionTitle>
              <ul style={{ margin:0, paddingLeft:18, lineHeight:2, fontSize:14 }}>{profile.goals.map((g, i) => <li key={i}>{g}</li>)}</ul>
            </div>
            <div className="card">
              <SectionTitle>트레이너 메모</SectionTitle>
              <textarea className="pt-input" rows={4} value={profile.notes} onChange={(e) => setProfile({ ...profile, notes:e.target.value })} />
            </div>
          </div>
        )}

        {/* ===== 백업 ===== */}
        {tab === "backup" && (
          <div className="flex flex-col gap-4">
            <div className="card">
              <SectionTitle>전체 백업</SectionTitle>
              <p style={{ fontSize:13, color:T.haze, margin:"0 0 12px" }}>
                데이터는 이 브라우저에 자동 저장됩니다. 기기를 옮기거나 보관할 때 CSV로 내보내고, 새 기기에서 불러오세요.
              </p>
              <button className="btn" style={{ width:"100%", background:T.ink, borderColor:T.ink, color:"#fff", fontWeight:700 }} onClick={exportAll}>
                <I.download size={16} /> 4개 파일 한 번에 내보내기
              </button>
            </div>
            <div className="grid grid-cols-1 gap-3 md:grid-cols-2">
              <BackupCard title="운동 프로그램" onExport={exportProgram} onImport={importProgram} />
              <BackupCard title="운동 기록" onExport={exportHistory} onImport={importHistory} />
              <BackupCard title="체성분" onExport={exportBody} onImport={importBody} />
              <BackupCard title="건강 프로필" onExport={exportProfile} onImport={importProfile} />
            </div>
          </div>
        )}

        <footer style={{ marginTop:26, fontSize:11.5, color:T.haze, textAlign:"center", fontWeight:600 }}>
          이서린 PT 대시보드
        </footer>
      </div>

      {/* 모바일 하단 내비 */}
      <nav className="bottom-nav">
        {navItems.map((tb) => {
          const Icon = tb.icon;
          return (
            <button key={tb.id} className={tab === tb.id ? "on" : ""} onClick={() => { setTab(tb.id); window.scrollTo(0, 0); }}>
              <Icon size={20} /> {tb.label}
            </button>
          );
        })}
      </nav>
    </div>
  );
}

/* ----------------------------- 하위 컴포넌트 ----------------------------- */
function SectionTitle({ children }) {
  return <h2 style={{ fontSize:15.5, fontWeight:700, margin:"0 0 12px" }}>{children}</h2>;
}

function IconBtn({ onClick, disabled, danger, children }) {
  return (
    <button onClick={onClick} disabled={disabled}
      style={{ width:40, height:40, borderRadius:10, border:"1.5px solid "+(danger ? T.claySoft : T.line),
        background: danger ? T.claySoft : "#fff", color: disabled ? T.line : (danger ? T.clay : T.haze),
        cursor: disabled ? "default" : "pointer", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
      {children}
    </button>
  );
}

function ConditionBanner({ mode }) {
  if (mode === "normal") return null;
  const data = mode === "light"
    ? { title:"가벼운 날 (생리 등)", tips:[
        "중량을 평소의 70–80%로 낮추고 세트수는 1세트 줄이기",
        "고중량 컴파운드(데드리프트·스쿼트)는 머신·힙 스러스트로 대체하거나 가동범위 축소",
        "강한 코어 압박 동작은 줄이고, 걷기·사이클 등 저강도 유산소와 모빌리티 우선",
      ]}
    : { title:"회복 · 디로드", tips:[
        "중량을 평소의 50–60%로 디로드, 세트수 축소·폼 위주",
        "통증·피로 부위는 대체 운동으로 회피",
        "수면·영양·스트레칭 비중을 늘려 회복에 집중",
      ]};
  return (
    <div style={{ border:"1.5px solid "+T.clay, background:T.claySoft, borderRadius:14, padding:"13px 15px" }}>
      <div style={{ fontWeight:700, fontSize:13.5, color:T.clay, marginBottom:6 }}>{data.title}</div>
      <ul style={{ margin:0, paddingLeft:17, fontSize:13, lineHeight:1.8 }}>
        {data.tips.map((t, i) => <li key={i}>{t}</li>)}
      </ul>
    </div>
  );
}

function StatCard({ label, value, unit, delta, suffix, good }) {
  const num = parseFloat(delta);
  const up = num > 0;
  const positive = good ? up : !up;
  const color = isNaN(num) || num === 0 ? T.haze : positive ? T.moss : T.clay;
  return (
    <div className="card" style={{ padding:14 }}>
      <div style={{ fontSize:12, color:T.haze, fontWeight:700, marginBottom:4 }}>{label}</div>
      <div className="h-disp" style={{ fontSize:26, lineHeight:1 }}>
        {value}<span style={{ fontSize:13, color:T.haze, fontWeight:700, marginLeft:2 }}>{unit}</span>
      </div>
      <div style={{ fontSize:11.5, color, marginTop:6, fontWeight:700 }}>
        {isNaN(num) || num === 0 ? "변화 없음" : ((up ? "▲ " : "▼ ") + Math.abs(num) + " " + (suffix || unit))}
      </div>
    </div>
  );
}

function AddExerciseRow({ onAdd }) {
  const [f, setF] = useState({ name:"", category:"fullbody", sets:"3", reps:"15" });
  function submit() {
    if (!f.name.trim()) return;
    onAdd({ name:f.name.trim(), category:f.category, sets:f.sets || "3", reps:f.reps || "15" });
    setF({ name:"", category:"fullbody", sets:"3", reps:"15" });
  }
  return (
    <div style={{ marginTop:12, padding:12, border:"1.5px dashed "+T.line, borderRadius:12 }}>
      <div style={{ fontSize:12, fontWeight:700, color:T.haze, marginBottom:8 }}>운동 추가</div>
      <div className="flex flex-col gap-2">
        <input className="pt-input" placeholder="운동 이름 (예: 레그컬)" value={f.name} onChange={(e) => setF({ ...f, name:e.target.value })} />
        <div className="grid gap-2" style={{ gridTemplateColumns:"1.2fr 1fr 1fr auto" }}>
          <select className="pt-input" value={f.category} onChange={(e) => setF({ ...f, category:e.target.value })}>
            {CATS.map(([v, l]) => <option key={v} value={v}>{l}</option>)}
          </select>
          <input className="pt-input" inputMode="numeric" placeholder="세트" value={f.sets} onChange={(e) => setF({ ...f, sets:e.target.value })} />
          <input className="pt-input" placeholder="횟수" value={f.reps} onChange={(e) => setF({ ...f, reps:e.target.value })} />
          <button className="btn btn-primary" style={{ minHeight:44 }} onClick={submit}><I.plus size={16} /></button>
        </div>
      </div>
    </div>
  );
}

function BodyCompTable({ data, onChange }) {
  const [form, setForm] = useState({ date:"", weight:"", skeletalMuscle:"", bodyFat:"", bodyFatPct:"", bmi:"" });
  const cols = [["date","날짜"],["weight","체중"],["skeletalMuscle","골격근"],["bodyFat","체지방량"],["bodyFatPct","체지방률"],["bmi","BMI"]];
  const add = () => {
    if (!form.date) return;
    const row = { ...form, weight:+form.weight, skeletalMuscle:+form.skeletalMuscle, bodyFat:+form.bodyFat, bodyFatPct:+form.bodyFatPct, bmi:+form.bmi };
    onChange([...data, row].sort((a,b) => a.date.localeCompare(b.date)));
    setForm({ date:"", weight:"", skeletalMuscle:"", bodyFat:"", bodyFatPct:"", bmi:"" });
  };
  const remove = (i) => onChange(data.filter((_, idx) => idx !== i));
  return (
    <div style={{ overflowX:"auto" }}>
      <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13, minWidth:560 }}>
        <thead>
          <tr style={{ color:T.haze, textAlign:"left" }}>
            {cols.map(([, l]) => <th key={l} style={{ padding:"8px", borderBottom:"1.5px solid "+T.line, fontWeight:700 }}>{l}</th>)}
            <th style={{ borderBottom:"1.5px solid "+T.line }} />
          </tr>
        </thead>
        <tbody>
          {data.map((r, i) => (
            <tr key={i}>
              {cols.map(([k]) => <td key={k} style={{ padding:"9px 8px", borderBottom:"1px solid "+T.line, fontWeight: k==="date" ? 600 : 400 }}>{r[k]}</td>)}
              <td style={{ padding:"9px 8px", borderBottom:"1px solid "+T.line, textAlign:"right" }}>
                <button onClick={() => remove(i)} style={{ border:"none", background:"none", cursor:"pointer", color:T.clay }}><I.trash size={16} /></button>
              </td>
            </tr>
          ))}
          <tr>
            {cols.map(([k]) => (
              <td key={k} style={{ padding:"8px 4px" }}>
                <input className="pt-input" style={{ minHeight:40, fontSize:13 }} type={k === "date" ? "date" : "number"} value={form[k]} onChange={(e) => setForm({ ...form, [k]:e.target.value })} />
              </td>
            ))}
            <td style={{ textAlign:"right" }}>
              <button onClick={add} style={{ border:"none", background:T.moss, color:"#fff", borderRadius:10, padding:"9px 11px", cursor:"pointer" }}><I.plus size={16} /></button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  );
}

function BackupCard({ title, onExport, onImport }) {
  const ref = useRef(null);
  return (
    <div className="card" style={{ padding:14 }}>
      <div style={{ fontWeight:700, fontSize:14, marginBottom:10 }}>{title}</div>
      <div className="flex gap-2">
        <button className="btn btn-soft" style={{ flex:1 }} onClick={onExport}><I.download size={15} /> 내보내기</button>
        <button className="btn" style={{ flex:1 }} onClick={() => ref.current && ref.current.click()}><I.upload size={15} /> 불러오기</button>
        <input ref={ref} type="file" accept=".csv" style={{ display:"none" }}
          onChange={(e) => { const f = e.target.files && e.target.files[0]; if (f) onImport(f); e.target.value = ""; }} />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<PTDashboard />);
</script>
</body>
</html>
